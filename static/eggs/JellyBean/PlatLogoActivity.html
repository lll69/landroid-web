<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>BeanBag</title>
    <style>
        html {
            overflow: hidden;
        }

        body {
            background: transparent;
        }

        #main {
            width: 100vw;
            height: 100vh;
        }

        .logo-img {
            width: calc(100% - 64px);
            height: calc(100% - 64px);
            object-fit: scale-down;
            cursor: pointer;
            padding: 32px;
        }

        .bean {
            position: fixed;
            touch-action: none;
        }

        * {
            touch-action: none;
            user-select: none;
        }
    </style>
    <link rel="shortcut icon" type="image/webp" href="j_platlogo.webp">
    <link rel="stylesheet" href="../normalize.css">
    <link rel="preload" as="image" href="j_platlogo.webp">
    <link rel="preload" as="image" href="j_platlogo_alt.webp">
</head>

<body>
    <div id="main">
        <img class="logo-img" src="j_platlogo_alt.webp">
    </div>
    <script src="BeanBag.js"></script>
</body>

</html>
